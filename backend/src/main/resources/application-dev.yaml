spring:
  datasource:
    url: jdbc:h2:mem:luckyflip-dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.limani: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
