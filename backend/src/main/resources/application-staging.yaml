spring:
  datasource:
    url: jdbc:h2:mem:luckyflip-staging;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update

logging:
  level:
    com.limani: INFO
    org.springframework.web: INFO
    org.springframework: WARN
