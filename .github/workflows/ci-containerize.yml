name: CI - Build & Scan

# Trigger workflow on push, PR, or manual dispatch
on:
  push:
    branches: [ main, master, devsecops ]
  pull_request:
    branches: [ main, master, devsecops ]
  workflow_dispatch: {}

# Force Node.js 24 for all JavaScript actions (future-proof)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Node.js
        run: |
          echo "Runner Node version:" && node -v || echo "Node not available"
          echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=$FORCE_JAVASCRIPT_ACTIONS_TO_NODE24"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build backend
        working-directory: backend
        run: mvn -B package -DskipTests

      - name: Build backend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: false
          tags: luckyflip-backend:ci
          file: ./backend/Dockerfile

      - name: Scan backend Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: luckyflip-backend:ci

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Node.js
        run: |
          echo "Runner Node version:" && node -v || echo "Node not available"
          echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=$FORCE_JAVASCRIPT_ACTIONS_TO_NODE24"

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install & build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build frontend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: false
          tags: luckyflip-frontend:ci
          file: ./frontend/Dockerfile

      - name: Scan frontend Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: luckyflip-frontend:ci

  compose-smoke:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Compose smoke test
        run: |
          docker compose -f docker-compose.yml up -d --build
          sleep 15
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml down

  sonar:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 for Sonar
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build backend for Sonar (bytecode needed)
        working-directory: backend
        run: mvn -B -DskipTests package

      - name: SonarCloud Analysis
        uses: sonarsource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=limanindou
            -Dsonar.projectKey=limanindou_LuckyFlip
            -Dsonar.sources=backend/src/main,frontend/src
            -Dsonar.java.binaries=backend/target/classes